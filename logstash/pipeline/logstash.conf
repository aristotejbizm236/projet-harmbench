input {
  file {
    path            => "/usr/share/logstash/external_data/*.json"
    start_position  => "beginning"
    # CORRECTIF : json_lines lit une ligne JSON à la fois (format JSONL)
    # L'ancien "json" attendait un objet JSON complet par fichier → plantait sur JSONL
    codec           => "json_lines"
    # sincedb_path évite que Logstash re-ingère les fichiers à chaque redémarrage
    sincedb_path    => "/usr/share/logstash/data/sincedb_harmbench"
  }
}

filter {
  # Normalisation du timestamp ISO8601 produit par le script Python
  date {
    match => [ "timestamp", "ISO8601" ]
  }

  # CORRECTIF : index dynamique par thème (standard / contextual / copyright)
  # On prépare le champ en minuscules pour éviter les variations
  mutate {
    lowercase => [ "theme" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # CORRECTIF : index séparé par thème → facilite les filtres Kibana par catégorie
    index => "harmbench-%{theme}-%{+YYYY.MM.dd}"
  }
}

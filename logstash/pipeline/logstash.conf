input {
  file {
    path => "/usr/share/logstash/external_data/*.json"
    start_position => "beginning"
    codec => "json"
  }
}

filter {
  # On ajoute un timestamp si absent
  date {
    match => [ "timestamp", "ISO8601" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "harmbench-hatespeech-%{+YYYY.MM.dd}"
  }
}